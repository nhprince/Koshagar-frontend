openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Koshagar cloud storage API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: files
    description: File operations
  - name: folders
    description: Folder operations
  - name: share
    description: Share links
  - name: activity
    description: Activity log
  - name: admin
    description: Admin operations
  - name: storage
    description: Storage info
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out

  /auth/profile:
    patch:
      operationId: updateProfile
      tags: [auth]
      summary: Update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /files:
    get:
      operationId: listFiles
      tags: [files]
      summary: List files in a folder
      parameters:
        - name: folderId
          in: query
          schema:
            type: ["integer", "null"]
          description: Folder ID (null for root)
        - name: starred
          in: query
          schema:
            type: ["boolean", "null"]
        - name: trash
          in: query
          schema:
            type: ["boolean", "null"]
        - name: search
          in: query
          schema:
            type: ["string", "null"]
        - name: sort
          in: query
          schema:
            type: string
            enum: [name, createdAt, size, updatedAt]
            default: name
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: asc
      responses:
        "200":
          description: List of files and folders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileListResponse"

  /files/recent:
    get:
      operationId: getRecentFiles
      tags: [files]
      summary: Get recently accessed files
      responses:
        "200":
          description: Recent files
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FileItem"

  /files/shared:
    get:
      operationId: getSharedFiles
      tags: [files]
      summary: Get files shared by the user
      responses:
        "200":
          description: Shared files
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FileItem"

  /files/upload:
    post:
      operationId: uploadFile
      tags: [files]
      summary: Upload a file
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadInput"
      responses:
        "201":
          description: Uploaded file
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileItem"

  /files/empty-trash:
    delete:
      operationId: emptyTrash
      tags: [files]
      summary: Permanently delete all trashed files
      responses:
        "204":
          description: Trash emptied

  /files/{id}:
    get:
      operationId: getFile
      tags: [files]
      summary: Get a file by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: File
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileItem"
        "404":
          description: Not found
    patch:
      operationId: updateFile
      tags: [files]
      summary: Rename or update a file
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FileUpdate"
      responses:
        "200":
          description: Updated file
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileItem"
    delete:
      operationId: deleteFile
      tags: [files]
      summary: Permanently delete a file
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /files/{id}/star:
    patch:
      operationId: starFile
      tags: [files]
      summary: Toggle star on a file
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StarInput"
      responses:
        "200":
          description: Updated file
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileItem"

  /files/{id}/trash:
    patch:
      operationId: trashFile
      tags: [files]
      summary: Move a file to trash or restore
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrashInput"
      responses:
        "200":
          description: Updated file
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileItem"

  /files/{id}/move:
    patch:
      operationId: moveFile
      tags: [files]
      summary: Move a file to a different folder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoveInput"
      responses:
        "200":
          description: Updated file
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileItem"

  /folders:
    post:
      operationId: createFolder
      tags: [folders]
      summary: Create a folder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FolderInput"
      responses:
        "201":
          description: Created folder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileItem"

  /folders/{id}:
    get:
      operationId: getFolder
      tags: [folders]
      summary: Get folder with breadcrumb path
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Folder with breadcrumb
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FolderDetail"

  /share:
    post:
      operationId: createShare
      tags: [share]
      summary: Create a share link for a file or folder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShareInput"
      responses:
        "201":
          description: Share link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareLink"

  /share/{token}:
    get:
      operationId: viewPublicShare
      tags: [share]
      summary: Get shared item by token (public)
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Shared item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicShareView"
        "401":
          description: Password required
        "404":
          description: Not found or expired
    delete:
      operationId: deleteShare
      tags: [share]
      summary: Delete a share link
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /share/{token}/stats:
    get:
      operationId: getShareStats
      tags: [share]
      summary: Get view/download stats for a share link
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Share stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareStats"

  /activity:
    get:
      operationId: getActivity
      tags: [activity]
      summary: Get activity log for current user
      parameters:
        - name: cursor
          in: query
          schema:
            type: ["integer", "null"]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Activity entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityPage"

  /storage/usage:
    get:
      operationId: getStorageUsage
      tags: [storage]
      summary: Get storage usage for current user
      responses:
        "200":
          description: Storage usage
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StorageUsage"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get admin dashboard stats
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/users:
    get:
      operationId: listAdminUsers
      tags: [admin]
      summary: List all users (admin)
      responses:
        "200":
          description: All users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"

  /admin/activity:
    get:
      operationId: getAdminActivity
      tags: [admin]
      summary: Get recent activity across all users (admin)
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityEntry"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    User:
      type: object
      required: [id, email, name, role, createdAt]
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [user, admin]
        avatarUrl:
          type: ["string", "null"]
        createdAt:
          type: string

    AuthResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: "#/components/schemas/User"

    RegisterInput:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
        password:
          type: string
        name:
          type: string

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    ProfileUpdate:
      type: object
      properties:
        name:
          type: string
        avatarUrl:
          type: ["string", "null"]

    FileItem:
      type: object
      required: [id, name, type, mimeType, size, starred, trashed, createdAt, updatedAt, ownerId]
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
          enum: [file, folder]
        mimeType:
          type: string
        size:
          type: integer
        starred:
          type: boolean
        trashed:
          type: boolean
        folderId:
          type: ["integer", "null"]
        ownerId:
          type: integer
        shareToken:
          type: ["string", "null"]
        thumbnailUrl:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
        trashedAt:
          type: ["string", "null"]

    FileListResponse:
      type: object
      required: [folders, files]
      properties:
        folders:
          type: array
          items:
            $ref: "#/components/schemas/FileItem"
        files:
          type: array
          items:
            $ref: "#/components/schemas/FileItem"

    FileUpdate:
      type: object
      properties:
        name:
          type: string

    UploadInput:
      type: object
      required: [name, mimeType, size]
      properties:
        name:
          type: string
        mimeType:
          type: string
        size:
          type: integer
        folderId:
          type: ["integer", "null"]
        dataUrl:
          type: ["string", "null"]

    StarInput:
      type: object
      required: [starred]
      properties:
        starred:
          type: boolean

    TrashInput:
      type: object
      required: [trashed]
      properties:
        trashed:
          type: boolean

    MoveInput:
      type: object
      properties:
        folderId:
          type: ["integer", "null"]

    FolderInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        folderId:
          type: ["integer", "null"]

    FolderDetail:
      type: object
      required: [folder, breadcrumb]
      properties:
        folder:
          $ref: "#/components/schemas/FileItem"
        breadcrumb:
          type: array
          items:
            $ref: "#/components/schemas/BreadcrumbItem"

    BreadcrumbItem:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string

    ShareInput:
      type: object
      required: [fileId]
      properties:
        fileId:
          type: integer
        password:
          type: ["string", "null"]
        expiresAt:
          type: ["string", "null"]
        allowDownload:
          type: boolean

    ShareLink:
      type: object
      required: [id, token, fileId, allowDownload, createdAt]
      properties:
        id:
          type: integer
        token:
          type: string
        fileId:
          type: integer
        password:
          type: ["string", "null"]
        expiresAt:
          type: ["string", "null"]
        allowDownload:
          type: boolean
        viewCount:
          type: integer
        downloadCount:
          type: integer
        createdAt:
          type: string

    PublicShareView:
      type: object
      required: [file, allowDownload, sharedBy]
      properties:
        file:
          $ref: "#/components/schemas/FileItem"
        allowDownload:
          type: boolean
        sharedBy:
          type: string
        expiresAt:
          type: ["string", "null"]
        requiresPassword:
          type: boolean

    ShareStats:
      type: object
      required: [viewCount, downloadCount]
      properties:
        viewCount:
          type: integer
        downloadCount:
          type: integer

    ActivityEntry:
      type: object
      required: [id, action, fileName, userId, userName, createdAt]
      properties:
        id:
          type: integer
        action:
          type: string
          enum: [upload, download, share, delete, rename, move, trash, restore, star]
        fileName:
          type: string
        fileId:
          type: ["integer", "null"]
        userId:
          type: integer
        userName:
          type: string
        createdAt:
          type: string

    ActivityPage:
      type: object
      required: [entries, hasMore]
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/ActivityEntry"
        hasMore:
          type: boolean
        nextCursor:
          type: ["integer", "null"]

    StorageUsage:
      type: object
      required: [usedBytes, totalBytes, fileCount]
      properties:
        usedBytes:
          type: integer
        totalBytes:
          type: integer
        fileCount:
          type: integer

    AdminStats:
      type: object
      required: [totalUsers, totalFiles, totalStorageBytes, activeToday]
      properties:
        totalUsers:
          type: integer
        totalFiles:
          type: integer
        totalStorageBytes:
          type: integer
        activeToday:
          type: integer

    AdminUser:
      type: object
      required: [id, email, name, role, fileCount, storageBytes, createdAt]
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string
        fileCount:
          type: integer
        storageBytes:
          type: integer
        createdAt:
          type: string
        lastActiveAt:
          type: ["string", "null"]
